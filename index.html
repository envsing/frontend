<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TVL Update Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #060000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .tvl-root {
      min-height: 360px;
      background: linear-gradient(160deg, #0a0000 0%, #130000 50%, #080000 100%);
      border-radius: 16px;
      border: 0.5px solid rgba(180,0,0,0.2);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
      width: 100%;
      max-width: 440px;
    }
    .tvl-root::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%; transform: translateX(-50%);
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(180,0,0,0.2) 0%, transparent 70%);
      pointer-events: none;
    }
    .tvl-root::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,0,0,0.5), transparent);
    }

    .drop-row {
      display: flex; gap: 14px; margin-bottom: 1.2rem;
    }
    .drop {
      font-size: 20px;
      display: inline-block;
      animation: drip 2.8s ease-in-out infinite;
    }
    .drop:nth-child(2) { animation-delay: 0.6s; }
    .drop:nth-child(3) { animation-delay: 1.3s; }
    @keyframes drip {
      0%,100% { transform: translateY(0); opacity: 0.7; }
      40% { transform: translateY(5px); opacity: 1; }
      70% { transform: translateY(2px); opacity: 0.85; }
    }

    .tvl-title {
      font-family: 'Cinzel', serif;
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.38em;
      color: rgba(180,0,0,0.55);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .tvl-game-name {
      font-family: 'Cinzel', serif;
      font-size: 21px; font-weight: 700;
      color: #f5dddd;
      text-align: center;
      text-shadow: 0 0 28px rgba(180,0,0,0.55);
      letter-spacing: 0.05em;
    }
    .divider {
      width: 110px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,0,0,0.55), transparent);
      margin: 1.3rem auto;
    }

    .status-card {
      background: rgba(180,0,0,0.05);
      border: 0.5px solid rgba(180,0,0,0.2);
      border-radius: 12px;
      padding: 1.5rem 2.5rem;
      text-align: center;
      width: 100%; max-width: 320px;
    }
    .status-label {
      font-family: 'Raleway', sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.22em;
      color: rgba(180,0,0,0.5);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .pulse-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(200,0,0,0.6);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }
    .status-value {
      font-family: 'Cinzel', serif;
      font-size: 19px; font-weight: 600;
      color: #ffbbbb;
      text-shadow: 0 0 18px rgba(180,0,0,0.5);
    }
    .status-value.empty {
      font-family: 'Raleway', sans-serif;
      font-size: 13px; font-weight: 400;
      font-style: italic;
      color: rgba(180,100,100,0.35);
      text-shadow: none;
      letter-spacing: 0.05em;
    }

    .enter-btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: rgba(180,0,0,0.12);
      border: 0.5px solid rgba(180,0,0,0.4);
      border-radius: 99px;
      color: #ff9999;
      font-family: 'Raleway', sans-serif;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.1em;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .enter-btn:hover {
      background: rgba(180,0,0,0.26);
      border-color: rgba(180,0,0,0.7);
      color: #ffcccc;
    }
    .enter-btn svg { width: 14px; height: 14px; }

    .corner-deco {
      position: absolute; width: 36px; height: 36px;
      border-color: rgba(180,0,0,0.15); border-style: solid; border-width: 0;
    }
    .corner-deco.tl { top:14px; left:14px; border-top-width:1px; border-left-width:1px; border-top-left-radius:4px; }
    .corner-deco.tr { top:14px; right:14px; border-top-width:1px; border-right-width:1px; border-top-right-radius:4px; }
    .corner-deco.bl { bottom:14px; left:14px; border-bottom-width:1px; border-left-width:1px; border-bottom-left-radius:4px; }
    .corner-deco.br { bottom:14px; right:14px; border-bottom-width:1px; border-right-width:1px; border-bottom-right-radius:4px; }
  </style>
</head>
<body>

<div class="tvl-root">
  <div class="corner-deco tl"></div>
  <div class="corner-deco tr"></div>
  <div class="corner-deco bl"></div>
  <div class="corner-deco br"></div>

  <div class="drop-row">
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
  </div>

  <div class="tvl-title">Update Tracker</div>
  <div class="tvl-game-name">The Vampire Legends 2</div>

  <div class="divider"></div>

  <div class="status-card">
    <div class="status-label">
      <span class="pulse-dot"></span>Último update
    </div>
    <div class="status-value empty" id="display-date">aguardando dados...</div>
  </div>

  <a class="enter-btn" href="https://www.roblox.com/games/10561456271" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
      <polyline points="15 3 21 3 21 9"/>
      <line x1="10" y1="14" x2="21" y2="3"/>
    </svg>
    Entrar no jogo
  </a>
</div>

<script>
async function loadUpdate() {
  const el = document.getElementById("display-date");

  try {
    el.textContent = "carregando...";

    const res = await fetch("https://tvl-update-tracker.tvlupdates.workers.dev/api/check");
    const data = await res.json();

    if (!data.checked || !data.checked.length) {
      el.textContent = "sem dados";
      return;
    }

    const game = data.checked.find(g => String(g.rootPlaceId) === "10561456271") || data.checked[0];

    if (!game.updated) {
      el.textContent = "sem update";
      return;
    }

    const date = new Date(game.updated);

    const formatted = date.toLocaleString("pt-BR", {
      timeZone: "America/Sao_Paulo",
      dateStyle: "short",
      timeStyle: "medium"
    });

    el.textContent = formatted;
    el.classList.remove("empty");
  } catch (err) {
    el.textContent = "erro ao carregar";
    console.error(err);
  }
}

loadUpdate();
</script>

</body>
</html>
